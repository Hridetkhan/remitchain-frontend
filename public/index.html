<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>RemitChain — Cross-Border Remittance</title>

        <!-- ============================================================ -->
        <!-- LEAN LINKSDK – DIRECT EMBED (Bypasses Loader Issues)         -->
        <!-- ============================================================ -->
        <!-- 
            ✅ This is the DIRECT script URL for the Lean SDK.
            It is NOT the loader. It loads the SDK directly.
            Works even when the loader is blocked.
        -->
        <script src="https://cdn.leantech.me/link/ae/sandbox/latest/lean-link-sdk.min.js">
        </script>

        <!-- ============================================================ -->
        <!-- SAFETY CHECK                                                  -->
        <!-- ============================================================ -->
        <script>
            console.log('🔍 Checking Lean SDK (Direct Embed)...');
            if (typeof window.Lean !== 'undefined') {
                console.log('✅ Lean SDK loaded successfully:', window.Lean);
            } else {
                console.error('❌ Lean SDK failed to load. Retrying with alternative URL...');
                
                // Fallback: Try loading from a different CDN path
                const script = document.createElement('script');
                script.src = 'https://cdn.leantech.me/link/ae/prod/latest/lean-link-sdk.min.js';
                script.onload = function() {
                    console.log('✅ Lean SDK loaded via fallback URL.');
                };
                script.onerror = function() {
                    console.error('❌ Lean SDK failed to load. Please check your network.');
                };
                document.head.appendChild(script);
            }
        </script>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
